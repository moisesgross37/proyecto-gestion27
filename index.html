<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Be Gestion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <h1>Menú Principal</h1>
        <p>Bienvenido, <span id="user-name">Usuario</span>.</p>
                          
<div id="quotes-production-container" class="ranking-card">
            <h3>📑 Producción de Presupuestos</h3>
            <p class="text-muted" style="font-size: 0.8em; margin-bottom: 10px;">
                (Máximo 2 contabilizados por centro educativo)
            </p>
            <ul id="quotes-production-list" class="resource-list">
                <li class="list-group-item text-center">Calculando producción...</li>
            </ul>
        </div>
        <div id="conversion-ranking-container" class="ranking-card">
        </div>

       
        <nav class="nav-grid" id="menu-buttons-container">
    </nav>

    <button onclick="window.location.href='/buscar_ficha.html'" class="btn" style="background-color: #17a2b8; margin-top: 10px; width: 100%;">📋 Fichas Técnicas (Consulta y Edición)</button>

    <a href="#" id="logout-btn" class="back-link" style="margin-top: 20px;">Cerrar Sesión</a>
</div>
    
        
    <script src="/main.js"></script>
<script>
        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('quotes-production-list');
            if (!list) return;

            try {
                const response = await fetch('/api/rankings/quotes-production');
                if (!response.ok) throw new Error('Error conectando al servidor');
                
                const data = await response.json();
                
                if(data.length === 0) {
                    list.innerHTML = '<li class="list-group-item text-muted">Aún no hay presupuestos registrados.</li>';
                    return;
                }

                list.innerHTML = ''; 
                
                data.forEach((item, index) => {
                    let icon = '📝';
                    let rowStyle = "";
                    
                    if (index === 0) {
                        rowStyle = "border-left: 5px solid #4CAF50; background-color: #f1f8e9;";
                        icon = '🏆';
                    } else if (index === 1) {
                        icon = '🥈';
                    } else if (index === 2) {
                        icon = '🥉';
                    }

                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.style = rowStyle;
                    li.innerHTML = `
                        <div>
                            <strong>${index + 1}. ${item.advisorname}</strong>
                        </div>
                        <div class="text-center">
                            <span class="badge bg-primary rounded-pill" style="font-size: 1.1em;">
                                ${icon} ${item.production_score}
                            </span>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error('Error cargando producción:', error);
                list.innerHTML = '<li class="list-group-item text-center text-danger">Error al cargar datos.</li>';
            }
            // === INICIO: RENDERIZAR TASA DE CONVERSIÓN ===
    try {
        const convResponse = await fetch('/api/conversion-ranking');
        if (convResponse.ok) {
            const convData = await convResponse.json();
            const convContainer = document.getElementById('conversion-ranking-container');

            let convHtml = `
                <h3>🚀 Tasa de Conversión</h3>
                <ul class="resource-list">
            `;

            if (convData.length === 0) {
                convHtml += `<li class="list-group-item text-muted">Aún no hay datos calculados.</li>`;
            } else {
                convData.forEach((item, index) => {
                    convHtml += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>${index + 1}. ${item.advisorname}</div>
                            <div class="text-end" style="min-width: 60px;">${item.conversion_rate}%</div>
                        </li>
                    `;
                });
            }
            convHtml += `</ul>`;
            convContainer.innerHTML = convHtml;
        }
    } catch (error) {
        console.error('Error cargando ranking de conversión:', error);
    }
    // === FIN: RENDERIZAR TASA DE CONVERSIÓN ===
        });
    </script>

    </body>
</html>
