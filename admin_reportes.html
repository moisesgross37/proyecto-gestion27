<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes de Alerta - Be Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .report-card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .report-card:hover { transform: translateY(-5px); }
        .header-title { color: #2c3e50; font-weight: 700; margin-bottom: 30px; }
        .status-badge { font-size: 0.8em; padding: 5px 10px; border-radius: 20px; }
        .btn-copy { background-color: #25D366; color: white; border: none; font-weight: bold; } /* Color WhatsApp */
        .btn-copy:hover { background-color: #128C7E; color: white; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="header-title">📊 Auditoría de Cartera</h1>
            <a href="/index.html" class="btn btn-outline-secondary">Volver al Menú</a>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card report-card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <span style="font-size: 2rem; margin-right: 10px;">👻</span>
                            <h3 class="card-title mb-0">Clientes "Fantasma"</h3>
                        </div>
                        <p class="text-muted">Centros activos que <strong>nadie ha visitado</strong> en los últimos 45 días.</p>
                        <button onclick="loadReport('ghosts')" class="btn btn-primary w-100">🔍 Detectar Abandonos</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card report-card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <span style="font-size: 2rem; margin-right: 10px;">🧟</span>
                            <h3 class="card-title mb-0">Clientes "Zombi"</h3>
                        </div>
                        <p class="text-muted">Centros con <strong>muchas visitas (+4)</strong> que aún no cierran.</p>
                        <button onclick="loadReport('zombies')" class="btn btn-warning w-100 text-dark">⚠️ Detectar Estancados</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="results-area" class="mt-5" style="display: none;">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center bg-white">
                    <h5 class="mb-0" id="results-title">Resultados</h5>
                    <button onclick="copyToClipboard()" class="btn btn-copy btn-sm">📋 Copiar para WhatsApp</button>
                </div>
                <div class="card-body">
                    <textarea id="whatsapp-text" class="form-control" rows="10" readonly style="background-color: #f8f9fa; border: none; font-family: monospace;"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadReport(type) {
            const resultsArea = document.getElementById('results-area');
            const title = document.getElementById('results-title');
            const textArea = document.getElementById('whatsapp-text');
            
            textArea.value = "Cargando datos del sistema...";
            resultsArea.style.display = 'block';

            try {
                const response = await fetch(`/api/reports/${type}`);
                const data = await response.json();

                if (data.length === 0) {
                    textArea.value = "✅ ¡Excelente! No se encontraron casos con este criterio.";
                    return;
                }

                // Generar texto formato WhatsApp
                let reportText = "";
                if (type === 'ghosts') {
                    title.textContent = `👻 LISTA DE ABANDONADOS (+45 DÍAS SIN VISITA)`;
                    reportText = `*🚨 ALERTA: CLIENTES ABANDONADOS (+45 DÍAS)*\n\nEstimado equipo, los siguientes centros requieren atención INMEDIATA o serán liberados:\n\n`;
                    data.forEach(item => {
                        reportText += `📍 *${item.center_name}*\n   👤 Asesor: ${item.advisor_name}\n   ⏳ Días sin ir: ${item.days_since} días\n   ------------------\n`;
                    });
                } else {
                    title.textContent = `🧟 LISTA DE ESTANCADOS (+4 VISITAS SIN CIERRE)`;
                    reportText = `*⚠️ ALERTA: CLIENTES ESTANCADOS (MUCHAS VISITAS)*\n\nEstos clientes han consumido muchos recursos. Se requiere CIERRE o PAUSA para el próximo año:\n\n`;
                    data.forEach(item => {
                        reportText += `🏫 *${item.center_name}*\n   👤 Asesor: ${item.advisor_name}\n   👣 Visitas: ${item.visit_count}\n   📊 Etapa: ${item.etapa_venta}\n   ------------------\n`;
                    });
                }
                reportText += `\nPor favor, reportar gestión sobre estos casos antes del viernes.`;
                
                textArea.value = reportText;

            } catch (error) {
                console.error(error);
                textArea.value = "❌ Error al cargar el reporte. Intenta de nuevo.";
            }
        }

        function copyToClipboard() {
            const copyText = document.getElementById("whatsapp-text");
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value);
            alert("¡Texto copiado! Ahora pégalo en WhatsApp.");
        }
    </script>
</body>
</html>
