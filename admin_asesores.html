<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Asesores - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .container { max-width: 800px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-activate { background-color: #28a745; color: white; border: none; }
        .btn-delete { background-color: #dc3545; color: white; border: none; }
        .audit-btn { font-weight: bold; border: 2px solid #000; }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">Gestión de Asesores</h2>
            <a href="/index.html" class="btn btn-outline-secondary">← Volver al Menú</a>
        </div>

        <div class="alert alert-warning d-flex justify-content-between align-items-center" role="alert">
            <span><strong>👮‍♂️ Auditoría de Cartera:</strong> Detecta clientes abandonados o estancados.</span>
            <a href="/admin_reportes.html" class="btn btn-warning audit-btn">📊 Ver Alertas y Reportes</a>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5>➕ Añadir Nuevo Asesor</h5>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="newAdvisorName" class="form-control" placeholder="Nombre del nuevo asesor...">
                    <button id="addAdvisorBtn" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-secondary text-white">
                <h5>👥 Lista de Asesores Actuales</h5>
            </div>
            <div class="card-body">
                <ul id="advisorList" class="list-group list-group-flush">
                    <li class="list-group-item text-muted">Cargando...</li>
                </ul>
            </div>
        </div>

    </div>

    <script>
        const API_URL = '/api/advisors';

        // 1. Cargar y Mostrar Asesores
        const fetchAndDisplayItems = async () => {
            const list = document.getElementById('advisorList');
            try {
                const response = await fetch(API_URL); 
                if (!response.ok) throw new Error('Error de conexión');
                const items = await response.json();
                
                list.innerHTML = ''; // Limpiar lista
                
                if (items.length === 0) {
                    list.innerHTML = `<li class="list-group-item">No hay asesores registrados.</li>`;
                    return;
                }

                items.forEach(item => {
                    const listItem = document.createElement('li');
                    listItem.className = 'list-group-item d-flex justify-content-between align-items-center';
                    
                    // Lógica Visual de Activo/Inactivo
                    const estaInactivo = (item.estado === 'inactivo'); 
                    
                    // Nombre del Asesor
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = `${item.name} (${item.estado || 'activo'})`;
                    if (estaInactivo) {
                        nameSpan.style.textDecoration = 'line-through';
                        nameSpan.style.color = '#dc3545'; // Rojo
                    }
                    listItem.appendChild(nameSpan);
                    
                    // Botón de Acción
                    const toggleButton = document.createElement('button');
                    toggleButton.textContent = estaInactivo ? 'Activar' : 'Desactivar';
                    toggleButton.className = `btn btn-sm ${estaInactivo ? 'btn-activate' : 'btn-delete'}`;
                    toggleButton.onclick = () => toggleItemStatus(item.id, item.estado);
                    
                    listItem.appendChild(toggleButton);
                    list.appendChild(listItem);
                });
            } catch (error) {
                console.error(error);
                list.innerHTML = `<li class="list-group-item text-danger">Error al cargar la lista.</li>`;
            }
        };

        // 2. Agregar Nuevo Asesor
        document.getElementById('addAdvisorBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('newAdvisorName');
            const name = nameInput.value.trim();
            if (!name) return alert('Escribe un nombre válido');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (res.ok) {
                    nameInput.value = '';
                    fetchAndDisplayItems(); // Recargar lista
                } else {
                    alert('Error al guardar');
                }
            } catch (err) { console.error(err); }
        });

        // 3. Cambiar Estado (Soft Delete)
        const toggleItemStatus = async (id, currentStatus) => {
            // Confirmación de seguridad
            if (!confirm(`¿Deseas cambiar el estado de este asesor?`)) return;

            try {
                const res = await fetch(`${API_URL}/${id}/toggle-status`, { method: 'POST' });
                if (res.ok) {
                    fetchAndDisplayItems(); // Recargar lista visualmente
                } else {
                    alert('No se pudo cambiar el estado.');
                }
            } catch (err) {
                console.error(err);
                alert('Error de conexión.');
            }
        };

        // Iniciar
        fetchAndDisplayItems();
    </script>
</body>
</html>
